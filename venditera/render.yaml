services:
  - type: web
    name: vendi-tera
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: TMDB_API_KEY
        sync: false        # set manually in Render dashboard — never commit your key
      - key: PYTHON_VERSION
        value: 3.11.0
